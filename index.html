<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Շնորհավոր Մարտի 8</title>
  <style>
    /* Общий стиль */
    body {
      margin: 0;
      font-family: Georgia, serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(135deg, #ffc0cb, #ffb6c1, #ffe6f2);
      background-size: 400% 400%;
      animation: gradientMove 20s ease infinite;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Падающие лепестки */
    .petals {
      pointer-events: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('https://png.pngtree.com/png-vector/20230110/ourmid/pngtree-pink-flower-petal-decoration-png-image_6551619.png');
      background-size: 40px;
      animation: movePetals 60s linear infinite;
      opacity: 0.15;
    }

    @keyframes movePetals {
      from {background-position: 0 0;}
      to {background-position: 0 1200px;}
    }

    /* Карточка с поздравлением */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.9);
      padding: 30px 20px;
      width: 90%;
      max-width: 400px;
      border-radius: 25px;
      box-shadow: 0 0 25px rgba(255, 182, 193, 0.4);
      animation: glow 6s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 15px rgba(255,182,193,0.4); }
      to { box-shadow: 0 0 35px rgba(255,105,180,0.6); }
    }

    h1 {
      color: #d63384;
      font-size: 1.5em;
      margin-bottom: 15px;
    }

    .text {
      font-size: 1em;
      line-height: 1.6em;
      color: #444;
    }
  </style>
</head>
<body>

  <!-- Лёгкий фон с лепестками -->
  <div class="petals"></div>

  <!-- Центральная карточка -->
  <div class="card">
    <h1>🌸 Սիրելի կանայք և աղջիկներ 🌸</h1>
    <p class="text">
      Թող այս գեղեցիկ գարնանային օրը<br>
      ձեզ պարգևի ջերմություն ու ժպիտներ։<br>
      Դուք մեր համալսարանի գեղեցկությունն եք,<br>
      ներշնչանքն ու պայծառ լույսը։<br>
      Թող ձեր օրերը միշտ ծաղկեն<br>
      երջանկությամբ և սիրով։
    </p>
  </div>

</body>
</html>
