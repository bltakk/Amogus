<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Շնորհավոր Մարտի 8</title>
<link rel="stylesheet" href="style.css">
<style>
/* Падающие цветки */
.petal {
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall linear forwards;
  pointer-events:none;
  z-index:1;
}

@keyframes fall {
  0% {
    transform:translateY(-10px) rotate(0deg);
    opacity:1;
  }
  100% {
    transform:translateY(110vh) rotate(360deg);
    opacity:0.8;
  }
}

/* Полупрозрачный блок текста */
.card {
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  margin:0 auto;
  padding:25px;
  background: rgba(255,255,255,0.5);
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Стрелки */
.nav-btn {
  cursor:pointer;
  font-size:24px;
  font-weight:bold;
  margin:0 10px;
  user-select:none;
}

button {
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
  <h1>🌸 Շնորհավոր Մարտի 8 🌸</h1>
  <p class="text" id="text"></p>
  <div>
    <span class="nav-btn" id="prev">&#8592;</span>
    <span class="nav-btn" id="next">&#8594;</span>
  </div>
  <button id="playBtn">Միացնել 🎵</button>
</div>

<script>
// Тексты для страниц
const pages = [
  "Թող գարունները գան ու չգնան… և որովհետև կինն է աշխարհի ամենաերկարատև գարունը։ Ու թող ձեր ժպիտներն ու դրական էներգիան միշտ լինեն բոլորի հարատև ուղեկիցը",
  "Երկրորդ էջի տեքստ",
  "Երրորդ էջի տեքստ",
  "Չորրորդ էջի տեքստ",
  "Հինգերորդ էջի տեքստ"
];

let current = 0;
const textEl = document.getElementById("text");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

// Обновление текста и стрелок
function updatePage() {
  textEl.textContent = pages[current];
  prevBtn.style.display = (current === 0) ? 'none' : 'inline';
  nextBtn.style.display = (current === pages.length - 1) ? 'inline' : 'inline';
}

updatePage();

// Навигация
prevBtn.addEventListener("click", () => {
  if (current > 0) { current--; updatePage(); }
});
nextBtn.addEventListener("click", () => {
  if (current < pages.length - 1) { current++; updatePage(); }
});

// Кнопка музыки
let music;
const btn = document.getElementById("playBtn");
btn.addEventListener("click", () => {
  if (!music) {
    music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.2;
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else if (music.paused) {
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else {
    music.pause();
    btn.textContent = "Միացնել 🎵";
  }
});

// Лепестки и цветки
const flowers = ["🌸","🌷","💗","🌺","❤️"]; // <- изменено
function createPetal(){
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
  petal.style.left = Math.random()*100 + "vw";
  petal.style.animationDuration = (5 + Math.random()*5) + "s";
  petal.style.fontSize = (16 + Math.random()*12) + "px";
  document.body.appendChild(petal);
  setTimeout(()=>{ petal.remove(); },11000);
}

setInterval(createPetal, 600);
</script>

</body>
</html>
