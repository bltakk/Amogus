<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Շնորհավոր Մարտի 8</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>🌸 Շնորհավոր Մարտի 8 🌸</h1>
  <p class="text" id="text"></p>
  <div>
    <span class="nav-btn" id="prev">&#8592;</span>
    <span class="nav-btn" id="next">&#8594;</span>
  </div>
  <button id="playBtn">Միացնել 🎵</button>
</div>

<script>
// Тексты для страниц
const pages = [
  "Թող գարունները գան ու չգնան… և որովհետև կինն է աշխարհի ամենաերկարատև գարունը։ Ու թող ձեր ժպիտներն ու դրական էներգիան միշտ լինեն բոլորի հարատև ուղեկիցը",
  "Երկրորդ էջի տեքստ",
  "Երրորդ էջի տեքստ",
  "Չորրորդ էջի տեքստ",
  "Հինգերորդ էջի տեքստ"
];

let current = 0;
const textEl = document.getElementById("text");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

// Функция обновления текста и стрелок
function updatePage() {
  textEl.textContent = pages[current];

  // Скрываем стрелки на границах
  prevBtn.style.display = (current === 0) ? 'none' : 'inline';
  nextBtn.style.display = (current === pages.length - 1) ? 'none' : 'inline';
}

// Инициализация первой страницы
updatePage();

// Навигация стрелками
prevBtn.addEventListener("click", () => {
  if (current > 0) {
    current--;
    updatePage();
  }
});

nextBtn.addEventListener("click", () => {
  if (current < pages.length - 1) {
    current++;
    updatePage();
  }
});

// Кнопка музыки для iOS и Android
let music;
const btn = document.getElementById("playBtn");

btn.addEventListener("click", () => {
  if (!music) {
    music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.2;
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else if (music.paused) {
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else {
    music.pause();
    btn.textContent = "Միացնել 🎵";
  }
});
</script>

</body>
</html>
