<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Շնորհավոր Մարտի 8</title>
<style>
/* Падающие цветки */
.petal {
  position:fixed;
  top:-30px;
  font-size:20px;
  pointer-events:none;
  z-index:1;
  transition: transform 0.2s ease;
}

/* Полупрозрачный блок текста */
.card {
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  margin:0 auto;
  padding:25px;
  background: rgba(255,255,255,0.8);
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Стрелки */
.nav-btn {
  cursor:pointer;
  font-size:24px;
  font-weight:bold;
  margin:0 10px;
  user-select:none;
}

button {
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
  <h1>🌸 Շնորհավոր Մարտի 8 🌸</h1>
  <p class="text" id="text"></p>
  <div>
    <span class="nav-btn" id="prev">&#8592;</span>
    <span class="nav-btn" id="next">&#8594;</span>
  </div>
  <button id="playBtn">Միացնել 🎵</button>
</div>

<script>
// Тексты для страниц
const pages = [
  "Թող գարունները գան ու չգնան… և որովհետև կինն է աշխարհի ամենաերկարատև գարունը։ Ու թող ձեր ժպիտներն ու դրական էներգիան միշտ լինեն բոլորի հարատև ուղեկիցը",
  "Երկրորդ էջի տեքստ",
  "Երրորդ էջի տեքստ",
  "Չորրորդ էջի տեքստ",
  "Հինգերորդ էջի տեքստ"
];

let current = 0;
const textEl = document.getElementById("text");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function updatePage() {
  textEl.textContent = pages[current];
  prevBtn.style.display = (current === 0) ? 'none' : 'inline';
  nextBtn.style.display = (current === pages.length - 1) ? 'inline' : 'inline';
}

updatePage();
prevBtn.addEventListener("click", () => { if(current>0){current--;updatePage();} });
nextBtn.addEventListener("click", () => { if(current<pages.length-1){current++;updatePage();} });

// Музыка
let music;
const btn = document.getElementById("playBtn");
btn.addEventListener("click", () => {
  if(!music){
    music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.2;
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else if(music.paused){
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else {
    music.pause();
    btn.textContent = "Միացնել 🎵";
  }
});

// Лепестки
const flowers = ["🌸","🌷","🌼","🌺","💐"];
const card = document.querySelector('.card');
const floor = window.innerHeight - 30; // низ экрана

function createPetal(){
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
  petal.style.left = Math.random()*100 + "vw";
  petal.style.fontSize = (16 + Math.random()*12) + "px";
  document.body.appendChild(petal);

  let pos = -30;
  const speed = 1 + Math.random()*2;

  const fall = setInterval(() => {
    pos += speed;
    petal.style.top = pos + "px";

    // Отскок при касании карточки
    const petalRect = petal.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    if (
      petalRect.bottom > cardRect.top &&
      petalRect.top < cardRect.bottom &&
      petalRect.left < cardRect.right &&
      petalRect.right > cardRect.left
    ){
      petal.style.transform = "translateY(-20px)";
    } else {
      petal.style.transform = "";
    }

    // Достигли низа экрана
    if(pos >= floor){
      clearInterval(fall);
      petal.style.position = "absolute";
      petal.style.top = floor + "px";
    }
  }, 20);
}

setInterval(createPetal, 500);
</script>

</body>
</html>
