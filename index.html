<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Շնորհավոր Մարտի 8</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>🌸 Շնորհավոր Մարտի 8 🌸</h1>
  <p class="text" id="text"></p>
  <div>
    <span class="nav-btn" id="prev">&#8592;</span>
    <span class="nav-btn" id="next">&#8594;</span>
  </div>
  <button id="playBtn">Միացնել 🎵</button>
</div>

<script>
// Тексты для страниц
const pages = [
  "Առաջին էջի տեքստ",
  "Երկրորդ էջի տեքստ",
  "Երրորդ էջի տեքստ",
  "Չորրորդ էջի տեքստ",
  "Հինգերորդ էջի տեքստ"
];

let current = 0;
const textEl = document.getElementById("text");
textEl.textContent = pages[current]; // сразу отображаем первую страницу

// Навигация стрелками
document.getElementById("prev").addEventListener("click", () => {
  current = (current - 1 + pages.length) % pages.length;
  textEl.textContent = pages[current];
});

document.getElementById("next").addEventListener("click", () => {
  current = (current + 1) % pages.length;
  textEl.textContent = pages[current];
});

// Кнопка музыки для iOS и Android
let music;
const btn = document.getElementById("playBtn");

btn.addEventListener("click", () => {
  if (!music) {
    music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.2;
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else if (music.paused) {
    music.play();
    btn.textContent = "Կանգնեցնել 🎵";
  } else {
    music.pause();
    btn.textContent = "Միացնել 🎵";
  }
});
</script>

</body>
</html>
