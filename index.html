<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
overflow:hidden;
}

/* падающие лепестки */

.petal{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-10px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0.8;
}
}

/* сердце */

.heart{
width:450px;
height:400px;
background:#ff2d55;
position:relative;
transform:rotate(-45deg);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 30px rgba(0,0,0,0.3);
animation:heartbeat 2s infinite;
}

@keyframes heartbeat{
0%{transform:rotate(-45deg) scale(1);}
25%{transform:rotate(-45deg) scale(1.05);}
40%{transform:rotate(-45deg) scale(1);}
60%{transform:rotate(-45deg) scale(1.05);}
100%{transform:rotate(-45deg) scale(1);}
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:450px;
height:400px;
background:#ff2d55;
border-radius:50%;
}

.heart:before{
top:-225px;
left:0;
}

.heart:after{
left:225px;
top:0;
}

/* текст */

.page{
display:none;
position:absolute;
width:300px;
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
transform:rotate(45deg);
line-height:1.4;
}

.page.active{
display:block;
}

/* стрелки */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:60px;
color:white;
cursor:pointer;
user-select:none;
font-weight:bold;
z-index:10;
}

.left{
left:40px;
}

.right{
right:40px;
}

.arrow:hover{
opacity:0.7;
}

</style>
</head>

<body>

<div class="arrow left" onclick="prevPage()">❮</div>
<div class="arrow right" onclick="nextPage()">❯</div>

<div class="heart">

<div class="page active">
Թող գարունները գան ու չգնան… և որովհետև կինն է աշխարհի ամենաերկարատև գարունը։  
Ու թող ձեր ժպիտներն ու դրական էներգիան միշտ լինեն բոլորի հարատև ուղեկիցը
</div>

<div class="page">
Առաջին էջի տեքստ
</div>

<div class="page">
Երկրորդ էջի տեքստ
</div>

<div class="page">
Երրորդ էջի տեքստ
</div>

</div>

<script>

/* страницы */

let currentPage = 0;
const pages = document.querySelectorAll(".page");

function showPage(index){

pages.forEach(p => p.classList.remove("active"));
pages[index].classList.add("active");

document.querySelector(".left").style.display =
index === 0 ? "none" : "block";

document.querySelector(".right").style.display =
index === pages.length - 1 ? "none" : "block";

}

function nextPage(){
if(currentPage < pages.length-1){
currentPage++;
showPage(currentPage);
}
}

function prevPage(){
if(currentPage > 0){
currentPage--;
showPage(currentPage);
}
}

showPage(currentPage);

/* лепестки */

function createPetal(){

const petal=document.createElement("div");
petal.classList.add("petal");
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
petal.style.fontSize=(16+Math.random()*14)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);

}

setInterval(createPetal,500);

</script>

</body>
</html>
