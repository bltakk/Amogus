<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
overflow:hidden;
}

/* падающие лепестки */

.petal{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-10px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0.8;
}
}

/* блок текста */

.card{
position:relative;
z-index:2;
width:85%;
max-width:400px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* страницы */

.page{
display:none;
font-size:18px;
line-height:1.5;
}

.page.active{
display:block;
}

/* стрелки */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
user-select:none;
font-weight:bold;
color:#ff2d55;
}

.left{
left:15px;
}

.right{
right:15px;
}

</style>
</head>

<body>

<div class="card">

<div class="arrow left" onclick="prevPage()">❮</div>
<div class="arrow right" onclick="nextPage()">❯</div>

<div class="page active">
Թող գարունները գան ու չգնան… և որովհետև կինն է աշխարհի ամենաերկարատև գարունը։  
Ու թող ձեր ժպիտներն ու դրական էներգիան միշտ լինեն բոլորի հարատև ուղեկիցը
</div>

<div class="page">
Առաջին էջի տեքստ
</div>

<div class="page">
Երկրորդ էջի տեքստ
</div>

<div class="page">
Երրորդ էջի տեքստ
</div>

</div>

<script>

/* страницы */

let currentPage = 0;
const pages = document.querySelectorAll(".page");

function showPage(index){

pages.forEach(p => p.classList.remove("active"));
pages[index].classList.add("active");

document.querySelector(".left").style.display =
index === 0 ? "none" : "block";

document.querySelector(".right").style.display =
index === pages.length - 1 ? "none" : "block";

}

function nextPage(){
if(currentPage < pages.length-1){
currentPage++;
showPage(currentPage);
}
}

function prevPage(){
if(currentPage > 0){
currentPage--;
showPage(currentPage);
}
}

showPage(currentPage);

/* лепестки */

function createPetal(){

const petal=document.createElement("div");
petal.classList.add("petal");
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(6+Math.random()*5)+"s";
petal.style.fontSize=(16+Math.random()*12)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},11000);

}

setInterval(createPetal,700);

</script>

</body>
</html>
